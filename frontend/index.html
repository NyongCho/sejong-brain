<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SejongBrain — 세종대학교 AI 학사 도우미</title>
    <meta name="description" content="세종대학교 수강신청, 장학금, 졸업요건 등 학사 정보를 AI가 즉시 답변해드립니다.">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="shortcut icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
</head>

<body>
    <div class="app">
        <!-- 헤더 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">🎓</span>
                <h1 class="logo-text">SejongBrain</h1>
            </div>
            <p class="subtitle">세종대학교 AI 학사 도우미</p>
        </header>

        <!-- 메인 검색 영역 -->
        <main class="main">
            <!-- 검색 박스 -->
            <div class="search-container" id="searchContainer">
                <form id="searchForm" class="search-form">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="questionInput" class="search-input"
                            placeholder="학사 정보를 검색하세요... (예: 수강신청 최대 학점)" autocomplete="off" autofocus>
                        <button type="submit" id="submitBtn" class="search-submit" aria-label="검색">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>

            <!-- 추천 질문 (초기 상태) -->
            <div class="suggestions" id="suggestions">
                <p class="suggestions-label">💡 이런 것도 물어보세요</p>
                <div class="suggestion-chips" id="suggestionChips">
                    <!-- JS로 동적 생성 -->
                </div>
            </div>

            <!-- 로딩 인디케이터 -->
            <div class="loading" id="loading" style="display: none;">
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
                <p class="loading-text">답변을 생성하고 있습니다...</p>
            </div>

            <!-- 답변 영역 -->
            <div class="answer-container" id="answerContainer" style="display: none;">
                <div class="answer-content">
                    <div class="answer-header">
                        <span class="answer-icon">📝</span>
                        <span class="answer-label">답변</span>
                    </div>
                    <div class="answer-text" id="answerText"></div>

                    <!-- 출처 카드 -->
                    <div class="sources" id="sourcesSection" style="display: none;">
                        <div class="sources-header">
                            <span>📎 출처</span>
                        </div>
                        <div class="sources-list" id="sourcesList"></div>
                    </div>
                </div>

                <!-- 액션 버튼 -->
                <div class="actions">
                    <button class="action-btn share-btn" id="shareBtn" title="공유하기">
                        🔗 공유하기
                    </button>
                    <button class="action-btn feedback-good" id="feedbackGood" title="도움됐어요">
                        👍 도움됐어요
                    </button>
                    <button class="action-btn feedback-bad" id="feedbackBad" title="틀렸어요">
                        👎 틀렸어요
                    </button>
                </div>
            </div>
        </main>

        <!-- 푸터 -->
        <footer class="footer">
            <p>SejongBrain은 AI 기반 서비스로, 답변의 정확성을 100% 보장하지 않습니다.</p>
            <p>공식 정보는 <a href="https://www.sejong.ac.kr" target="_blank" rel="noopener">세종대학교 홈페이지</a>를 확인해주세요.</p>
        </footer>
    </div>

    <!-- Markdown Parse Library -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>

</html>
